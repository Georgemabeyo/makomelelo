<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vizazi vya Ukoo - Ukoo wa Makomelelo</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --gold-metallic: linear-gradient(135deg, #d4af37 0%, #f1c40f 50%, #b8860b 100%);
            --gold-solid: #d4af37;
            --black-deep: #0a0a0a;
            --black-soft: #1a1a1a;
            --border-glass: rgba(212, 175, 55, 0.2);
            --text-muted: #a4a4a4;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--black-deep);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ======== HEADER (Matching Dashboard) ======== */
        header {
            background: var(--black-soft);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border-glass);
        }

        header h1 { 
            font-size: 1.1rem; 
            font-weight: 800; 
            color: var(--gold-solid); 
            text-transform: uppercase; 
            letter-spacing: 1px;
        }

        nav#main-nav { display: flex; gap: 10px; }
        nav#main-nav a {
            text-decoration: none; color: var(--text-muted); font-weight: 600;
            padding: 8px 15px; border-radius: 8px; transition: var(--transition);
            font-size: 0.9rem;
        }
        nav#main-nav a:hover, nav#main-nav a.active {
            background: var(--gold-metallic); color: black;
        }

        .menu-toggle { display: none; font-size: 1.5rem; color: var(--gold-solid); cursor: pointer; }

        /* ======== TREE CONTAINER ======== */
        main.tree-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
            width: 100%;
            flex-grow: 1;
        }

        .tree-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .tree-header h2 {
            font-size: 2.2rem;
            font-weight: 800;
            background: var(--gold-metallic);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .tree-header p { color: var(--text-muted); font-weight: 300; }

        /* ======== TREE ACCORDION ======== */
        .tree-card {
            background: var(--black-soft);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 100px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .member-item {
            margin: 8px 0;
            list-style: none;
        }

        .member-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 18px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid transparent;
        }

        .member-header:hover {
            background: rgba(212, 175, 55, 0.05);
            border-color: var(--border-glass);
            transform: translateX(5px);
        }

        .member-header.active {
            background: rgba(212, 175, 55, 0.1);
            border-color: var(--gold-solid);
        }

        .name-area { display: flex; align-items: center; gap: 15px; }
        .name-area i.chevron { transition: transform 0.3s; color: var(--text-muted); font-size: 0.8rem; }
        .member-header.active i.chevron { transform: rotate(180deg); color: var(--gold-solid); }

        .eye-btn {
            color: var(--gold-solid);
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: 0.3s;
            background: rgba(212, 175, 55, 0.1);
        }

        .eye-btn:hover { background: var(--gold-metallic); color: black; transform: scale(1.1); }

        /* Nesting Levels */
        .children-list {
            display: none;
            padding-left: 25px;
            border-left: 1px solid var(--border-glass);
            margin: 5px 0 15px 15px;
        }
        .children-list.show { display: block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* ======== MODAL ======== */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: var(--black-soft);
            border: 1px solid var(--gold-solid);
            width: 90%;
            max-width: 450px;
            padding: 40px;
            border-radius: 24px;
            position: relative;
            text-align: center;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.2);
        }

        .close-btn { position: absolute; top: 20px; right: 20px; color: var(--text-muted); cursor: pointer; font-size: 1.5rem; }
        .modal-content i.user-avatar { font-size: 4rem; color: var(--gold-solid); margin-bottom: 20px; }
        .modal-content h3 { font-size: 1.8rem; margin-bottom: 20px; color: var(--gold-solid); }
        .info-grid { text-align: left; margin-top: 20px; }
        .info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .info-row span:first-child { color: var(--text-muted); font-size: 0.9rem; }

        /* ======== MOBILE ======== */
        @media (max-width: 768px) {
            .menu-toggle { display: block; }
            nav#main-nav {
                position: fixed; top: 0; right: -100%; height: 100vh; width: 280px;
                background: var(--black-soft); flex-direction: column; padding: 80px 20px; transition: 0.4s;
                border-left: 1px solid var(--border-glass);
            }
            nav#main-nav.active { right: 0; }
            .tree-header h2 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Ukoo Makomelelo</h1>
        <div class="menu-toggle" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>
        <nav id="main-nav">
            <a href="dashboard.html">Dashboard</a>
            <a href="family_tree.html" class="active">Ukoo</a>
            <a href="events.html">Matukio</a>
            <a href="register.html">Jisajili</a>
            <a href="logout.html">Toka</a>
        </nav>
    </header>

    <main class="tree-container">
        <div class="tree-header">
            <h2>Vizazi vya Ukoo</h2>
            <p>Gusa jina kuona watoto, gusa jicho kuona wasifu kamili.</p>
        </div>

        <div class="tree-card">
            <div class="member-item">
                <div class="member-header" onclick="toggleNode(this)">
                    <div class="name-area">
                        <i class="fas fa-chevron-down chevron"></i>
                        <strong>Makomelelo (Babu Mkuu)</strong>
                    </div>
                    <div class="eye-btn" onclick="showDetails(event, 'Makomelelo Kaloya', '1890', 'Mwanza', 'Hayati')">
                        <i class="fas fa-eye"></i>
                    </div>
                </div>

                <div class="children-list">
                    
                    <div class="member-item">
                        <div class="member-header" onclick="toggleNode(this)">
                            <div class="name-area">
                                <i class="fas fa-chevron-down chevron"></i>
                                <strong>Nyabhusu</strong>
                            </div>
                            <div class="eye-btn" onclick="showDetails(event, 'Nyabhusu Makomelelo', '1920', 'Busangi', 'Hayati')">
                                <i class="fas fa-eye"></i>
                            </div>
                        </div>
                        <div class="children-list">
                            <div class="member-item">
                                <div class="member-header" onclick="toggleNode(this)">
                                    <div class="name-area">
                                        <i class="fas fa-chevron-down chevron"></i>
                                        <strong>Joseph</strong>
                                    </div>
                                    <div class="eye-btn" onclick="showDetails(event, 'Joseph Nyabhusu', '1950', 'Geita', 'Yupo')">
                                        <i class="fas fa-eye"></i>
                                    </div>
                                </div>
                                <div class="children-list">
                                    <div class="member-item"><div class="member-header"><strong>Moses</strong></div></div>
                                    <div class="member-item"><div class="member-header"><strong>Peter</strong></div></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="member-item">
                        <div class="member-header" onclick="toggleNode(this)">
                            <div class="name-area">
                                <i class="fas fa-chevron-down chevron"></i>
                                <strong>Seleman</strong>
                            </div>
                            <div class="eye-btn" onclick="showDetails(event, 'Seleman Makomelelo', '1925', 'Mwanza', 'Hayati')">
                                <i class="fas fa-eye"></i>
                            </div>
                        </div>
                        <div class="children-list">
                            <div class="member-item"><div class="member-header"><strong>Shoma</strong></div></div>
                            <div class="member-item"><div class="member-header"><strong>Juma</strong></div></div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <div class="modal" id="infoModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <i class="fas fa-user-circle user-avatar"></i>
            <h3 id="mName">Jina la Mwanaukoo</h3>
            <div class="info-grid">
                <div class="info-row"><span>Mwaka wa Kuzaliwa</span><span id="mDob">-</span></div>
                <div class="info-row"><span>Makazi</span><span id="mLoc">-</span></div>
                <div class="info-row"><span>Hali</span><span id="mStatus">-</span></div>
            </div>
        </div>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById("main-nav").classList.toggle("active");
        }

        function toggleNode(element) {
            const children = element.nextElementSibling;
            if (children && children.classList.contains('children-list')) {
                children.classList.toggle('show');
                element.classList.toggle('active');
            }
        }

        function showDetails(event, name, dob, loc, status) {
            event.stopPropagation(); // Prevent accordion from toggling
            document.getElementById('mName').innerText = name;
            document.getElementById('mDob').innerText = dob;
            document.getElementById('mLoc').innerText = loc;
            document.getElementById('mStatus').innerText = status;
            document.getElementById('infoModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('infoModal').style.display = 'none';
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('infoModal');
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
