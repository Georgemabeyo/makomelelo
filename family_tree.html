<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dashboard - Ukoo wa Makomelelo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --sidebar-width: 260px;
            --primary-green: #028a42;
            --dark-bg: #0b1a11;
            --light-bg: #f4f7f6;
            --text-dark: #2d3436;
            --white: #ffffff;
            --border-color: #e1e8e5;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--light-bg);
            display: flex;
            min-height: 100vh;
            color: var(--text-dark);
        }

        /* ======== SIDEBAR ======== */
        aside.sidebar {
            width: var(--sidebar-width);
            background: var(--dark-bg);
            color: white;
            position: fixed;
            height: 100vh;
            display: flex;
            flex-direction: column;
            z-index: 1000;
            transition: 0.3s;
        }

.sidebar-header {
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .sidebar-header h1 { font-size: 1.2rem; letter-spacing: 1px; color: var(--primary-green); }

        nav.sidebar-nav {
            flex-grow: 1;
            padding: 20px 10px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            color: #b2bec3;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 5px;
            transition: 0.3s;
        }

        .nav-item i { margin-right: 12px; width: 20px; text-align: center; }

        .nav-item:hover, .nav-item.active {
            background: var(--primary-green);
            color: white;
        }
        /* ======== MAIN CONTENT ======== */
        main.main-content {
            margin-left: var(--sidebar-width);
            flex-grow: 1;
            padding: 40px;
            max-width: calc(100vw - var(--sidebar-width));
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .user-profile { display: flex; align-items: center; gap: 10px; font-weight: 600; }
        .user-profile img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--primary-green); }

        /* ======== DASHBOARD CARD STYLE ======== */
        .tree-card {
            background: var(--white);
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
            padding: 25px;
        }

        .card-header {
            margin-bottom: 25px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        /* ======== ACCORDION TREE ======== */
        .tree-node {
            margin-bottom: 10px;
        }

        .node-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fdfdfd;
            border: 1px solid var(--border-color);
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .node-label:hover { border-color: var(--primary-green); background: #f0fdf4; }

        .node-info { display: flex; align-items: center; gap: 12px; }
        .node-info i.toggle-icon { font-size: 0.8rem; color: #999; transition: 0.3s; }
        
        .active .toggle-icon { transform: rotate(180deg); color: var(--primary-green); }

        .node-actions .view-btn {
            color: var(--primary-green);
            background: #e6f7ef;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.85rem;
            border: none;
            cursor: pointer;
        }

        .tree-children {
            list-style: none;
            padding-left: 30px;
            border-left: 2px solid #edf2f0;
            margin-top: 5px;
            display: none;
        }

        .tree-children.show { display: block; }

        /* ======== MODAL ======== */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        /* ======== RESPONSIVE ======== */
        @media (max-width: 900px) {
            aside.sidebar { transform: translateX(-100%); }
            aside.sidebar.open { transform: translateX(0); }
            main.main-content { margin-left: 0; padding: 20px; max-width: 100%; }
            .mobile-toggle { display: block !important; }
        }

        .mobile-toggle {
            display: none;
            font-size: 1.5rem;
            cursor: pointer;
            background: none;
            border: none;
            color: var(--dark-bg);
        }
    </style>
</head>
<body>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h1>MAKO-DASH</h1>
        </div>
        <nav class="sidebar-nav">
            <a href="index.html" class="nav-item"><i class="fas fa-home"></i> Nyumbani</a>
            <a href="dashboard.html" class="nav-item"><i class="fas fa-chart-line"></i> Dashboard</a>
            <a href="tree.html" class="nav-item active"><i class="fas fa-sitemap"></i> Ukoo / Tree</a>
            <a href="events.html" class="nav-item"><i class="fas fa-calendar-alt"></i> Matukio</a>
            <a href="members.html" class="nav-item"><i class="fas fa-users"></i> Wanachama</a>
            <div style="margin-top: 50px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
                <a href="settings.html" class="nav-item"><i class="fas fa-cog"></i> Mipangilio</a>
                <a href="login.html" class="nav-item" style="color: #ff7675;"><i class="fas fa-sign-out-alt"></i> Toka</a>
            </div>
        </nav>
    </aside>

    <main class="main-content">
        <div class="top-bar">
            <button class="mobile-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
            <h2 style="font-weight: 700;">Vizazi vya Ukoo</h2>
            <div class="user-profile">
                <span>Mwanaukoo Admin</span>
                <img src="https://ui-avatars.com/api/?name=Admin+Ukoo&background=028a42&color=fff" alt="User">
            </div>
        </div>

        <div class="tree-card">
            <div class="card-header">
                <p style="color: #636e72; font-size: 0.9rem;">Gusa jina kupanua vizazi au kitufe cha "Angalia" kuona wasifu kamili.</p>
            </div>

            <div class="tree-container">
                
                <div class="tree-node">
                    <div class="node-label" onclick="toggleNode(this)">
                        <div class="node-info">
                            <i class="fas fa-chevron-down toggle-icon"></i>
                            <strong>Makomelelo (Babu Mkuu)</strong>
                        </div>
                        <div class="node-actions">
                            <button class="view-btn" onclick="showInfo(event, 'Makomelelo')">Angalia</button>
                        </div>
                    </div>
                    
                    <ul class="tree-children show">
                        <li>
                            <div class="tree-node">
                                <div class="node-label" onclick="toggleNode(this)">
                                    <div class="node-info">
                                        <i class="fas fa-chevron-right toggle-icon"></i>
                                        <span>Nyabhusu</span>
                                    </div>
                                    <div class="node-actions">
                                        <button class="view-btn" onclick="showInfo(event, 'Nyabhusu')">Angalia</button>
                                    </div>
                                </div>
                                <ul class="tree-children">
                                    <li><div class="node-label"><span>Joseph</span></div></li>
                                    <li><div class="node-label"><span>Martha</span></div></li>
                                </ul>
                            </div>
                        </li>

                        <li>
                            <div class="tree-node">
                                <div class="node-label" onclick="toggleNode(this)">
                                    <div class="node-info">
                                        <i class="fas fa-chevron-right toggle-icon"></i>
                                        <span>Seleman</span>
                                    </div>
                                    <div class="node-actions">
                                        <button class="view-btn" onclick="showInfo(event, 'Seleman')">Angalia</button>
                                    </div>
                                </div>
                                <ul class="tree-children">
                                    <li><div class="node-label"><span>Shoma</span></div></li>
                                    <li><div class="node-label"><span>Juma</span></div></li>
                                </ul>
                            </div>
                        </li>
                    </ul>
                </div>

            </div>
        </div>
    </main>

    <div id="infoModal" class="modal">
        <div class="modal-content">
            <h3 id="modalName" style="margin-bottom: 10px; color: var(--primary-green);">Jina</h3>
            <p id="modalDesc" style="color: #636e72; line-height: 1.6;">Maelezo...</p>
            <button onclick="closeModal()" style="margin-top: 20px; padding: 10px 25px; border-radius: 8px; border: none; background: var(--primary-green); color: white; cursor: pointer;">Funga</button>
        </div>
    </div>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        function toggleNode(element) {
            const children = element.nextElementSibling;
            if (children && children.tagName === 'UL') {
                children.classList.toggle('show');
                element.classList.toggle('active');
            }
        }

        function showInfo(event, name) {
            event.stopPropagation();
            const modal = document.getElementById('infoModal');
            document.getElementById('modalName').innerText = name;
            
            const database = {
                'Makomelelo': 'Huyu ndiye kiini cha ukoo wetu. Alizaliwa mwaka 1870 na alikuwa maarufu kwa busara zake mkoani Mwanza.',
                'Nyabhusu': 'Mtoto mkubwa wa Makomelelo, mwasisi wa tawi la kwanza la familia.'
            };

            document.getElementById('modalDesc').innerText = database[name] || "Taarifa za mwanaukoo huyu zinahifadhiwa kwenye kumbukumbu zetu.";
            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('infoModal').style.display = 'none';
        }
    </script>
</body>
</html>
