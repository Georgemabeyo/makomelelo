<!DOCTYPE html>
<html lang="sw">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jisajili - Ukoo wa Makomelelo</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    /* ======== VARIABLES & RESET ======== */
    :root {
      --primary: #027148;
      --primary-dark: #014d31;
      --accent: #ffcc00;
      --text-dark: #1a2e1a;
      --glass-bg: rgba(255, 255, 255, 0.9);
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      color: var(--text-dark);
      min-height: 100vh;
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                  url('https://images.unsplash.com/photo-1502082553048-f009c37129b9?auto=format&fit=crop&q=80&w=2070') no-repeat center center fixed;
      background-size: cover;
      line-height: 1.6;
    }

    /* ======== HEADER ======== */
    header {
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      padding: 1rem 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 2px 15px rgba(0,0,0,0.1);
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    nav#main-nav {
      display: flex;
      gap: 10px;
    }

    nav#main-nav a {
      text-decoration: none;
      color: var(--text-dark);
      font-weight: 600;
      padding: 8px 16px;
      border-radius: 8px;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    nav#main-nav a:hover, nav#main-nav a.active {
      background: var(--primary);
      color: white;
    }

    .menu-toggle {
      display: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--primary);
    }

    /* ======== FORM STYLES ======== */
    main {
      padding: 40px 5%;
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: center;
    }

    .form-container {
      background: var(--glass-bg);
      padding: 40px;
      border-radius: 20px;
      width: 100%;
      max-width: 650px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.3);
    }

    h2 {
      color: var(--primary-dark);
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 10px;
      text-align: center;
    }

    .form-subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-size: 0.95rem;
    }

    label {
      display: block;
      margin-top: 20px;
      font-weight: 700;
      color: var(--primary-dark);
      font-size: 0.9rem;
      margin-bottom: 5px;
    }

    input[type="text"],
    input[type="number"],
    select {
      width: 100%;
      padding: 12px 15px;
      border-radius: 10px;
      border: 2px solid #e1e1e1;
      background: rgba(255,255,255,0.8);
      font-family: inherit;
      font-size: 1rem;
      transition: var(--transition);
    }

    input:focus, select:focus {
      border-color: var(--primary);
      outline: none;
      box-shadow: 0 0 0 4px rgba(2, 113, 72, 0.1);
      background: #fff;
    }

    .grid-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    input[type="submit"] {
      background: var(--primary);
      color: white;
      border: none;
      width: 100%;
      padding: 15px;
      font-size: 1.1rem;
      font-weight: 700;
      border-radius: 12px;
      margin-top: 40px;
      cursor: pointer;
      transition: var(--transition);
      box-shadow: 0 4px 15px rgba(2, 113, 72, 0.3);
    }

    input[type="submit"]:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(2, 113, 72, 0.4);
    }

    #successMessage {
      background: #e8f5e9;
      color: #2e7d32;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      font-weight: 700;
      margin-top: 20px;
      display: none;
      border: 1px solid #c8e6c9;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      text-decoration: none;
      color: var(--primary);
      font-weight: 600;
    }

    /* Hide containers initially */
    #maritalStatusContainer, #childrenDetailsContainer, #tanzaniaAddress, #outsideAddress {
      display: none;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ======== RESPONSIVE ======== */
    @media (max-width: 768px) {
      .menu-toggle { display: block; }
      nav#main-nav {
        position: fixed; top: 0; right: -100%;
        height: 100vh; width: 280px;
        background: white; flex-direction: column;
        padding: 80px 20px; transition: 0.4s;
        box-shadow: -5px 0 15px rgba(0,0,0,0.2);
      }
      nav#main-nav.active { right: 0; }
      .grid-row { grid-template-columns: 1fr; }
      .form-container { padding: 25px; }
    }
  </style>
</head>

<body>

  <header>
    <div class="logo">Ukoo Makomelelo</div>
    <div class="menu-toggle" onclick="toggleMenu()">
        <i class="fas fa-bars"></i>
    </div>
    <nav id="main-nav">
      <a href="index.html"><i class="fas fa-home"></i> Nyumbani</a>
      <a href="register.html" class="active"><i class="fas fa-user-plus"></i> Jisajili</a>
      <a href="login.html"><i class="fas fa-sign-in-alt"></i> Ingia</a>
    </nav>
  </header>

  <main>
    <div class="form-container">
      <form id="registrationForm" novalidate>
        <h2>Jiunge na Ukoo</h2>
        <p class="form-subtitle">Jaza fomu hapa chini ili kusajiliwa kwenye mfumo rasmi.</p>

        <label for="fullname">Jina Kamili</label>
        <input type="text" id="fullname" name="fullname" placeholder="Mfano: John Joseph Makomelelo" required />

        <label for="phone">Namba ya Simu</label>
        <input type="text" id="phone" name="phone" required placeholder="07xxxxxxxx" pattern="^07[0-9]{8}$"
          title="Ingiza namba halali (mfano: 0712345678)" />

        <div class="grid-row">
            <div>
                <label for="gender">Jinsia</label>
                <select id="gender" name="gender" required>
                  <option value="" disabled selected>Chagua...</option>
                  <option value="mwanaume">Mwanaume</option>
                  <option value="mwanamke">Mwanamke</option>
                </select>
            </div>
            <div id="maritalStatusContainer">
                <label for="maritalStatus">Hali ya Ndoa</label>
                <select id="maritalStatus" name="maritalStatus">
                  <option value="" disabled selected>Chagua...</option>
                </select>
            </div>
        </div>

        <label for="hasChildren">Je, una watoto?</label>
        <select id="hasChildren" name="hasChildren" required>
          <option value="" disabled selected>Chagua jibu</option>
          <option value="ndiyo">Ndiyo</option>
          <option value="hapana">Hapana</option>
        </select>

        <div id="childrenDetailsContainer">
          <label for="totalChildren">Idadi ya watoto (Jumla)</label>
          <input type="number" id="totalChildren" name="totalChildren" min="0" placeholder="0" />

          <div class="grid-row">
              <div>
                <label for="boysCount">Wavulana</label>
                <input type="number" id="boysCount" name="boysCount" min="0" placeholder="0" />
              </div>
              <div>
                <label for="girlsCount">Wasichana</label>
                <input type="number" id="girlsCount" name="girlsCount" min="0" placeholder="0" />
              </div>
          </div>
        </div>

        <label for="country">Nchi unayoishi</label>
        <select id="country" name="country" required>
          <option value="" disabled selected>Chagua nchi</option>
          <option value="tanzania">Tanzania</option>
          <option value="nje">Nje ya Tanzania</option>
        </select>

        <div id="tanzaniaAddress">
          <div class="grid-row">
              <div>
                  <label for="region">Mkoa</label>
                  <select id="region" name="region">
                    <option value="" disabled selected>Chagua...</option>
                    <option value="arusha">Arusha</option>
                    <option value="dar_es_salaam">Dar es Salaam</option>
                    <option value="dodoma">Dodoma</option>
                    <option value="geita">Geita</option>
                    <option value="iringa">Iringa</option>
                    <option value="kagera">Kagera</option>
                    <option value="katavi">Katavi</option>
                    <option value="kigoma">Kigoma</option>
                    <option value="kilimanjaro">Kilimanjaro</option>
                    <option value="lindi">Lindi</option>
                    <option value="manyara">Manyara</option>
                    <option value="mara">Mara</option>
                    <option value="mbeya">Mbeya</option>
                    <option value="morogoro">Morogoro</option>
                    <option value="mtwara">Mtwara</option>
                    <option value="mwanza">Mwanza</option>
                    <option value="njombe">Njombe</option>
                    <option value="pwani">Pwani</option>
                    <option value="rukwa">Rukwa</option>
                    <option value="ruvuma">Ruvuma</option>
                    <option value="shinyanga">Shinyanga</option>
                    <option value="singida">Singida</option>
                    <option value="tabora">Tabora</option>
                    <option value="tanga">Tanga</option>
                  </select>
              </div>
              <div>
                  <label for="district">Wilaya</label>
                  <select id="district" name="district">
                    <option value="" disabled selected>Chagua...</option>
                  </select>
              </div>
          </div>

          <label for="ward">Kata</label>
          <select id="ward" name="ward">
            <option value="" disabled selected>Chagua kata</option>
          </select>

          <label for="street">Mtaa/Kijiji</label>
          <input type="text" id="street" name="street" placeholder="Andika jina la mtaa" />
        </div>

        <div id="outsideAddress">
          <label for="outsideCountry">Nchi Unayoishi</label>
          <input type="text" id="outsideCountry" name="outsideCountry" placeholder="Mfano: Kenya, USA, nk." />
          
          <label for="city">Jiji/Mji</label>
          <input type="text" id="city" name="city" placeholder="Mfano: Nairobi" />
        </div>

        <input type="submit" value="Kamilisha Usajili" />

        <div id="successMessage">✅ Hongera! Usajili umefanikiwa. Unahamishiwa kwenye ukurasa wa kuingia...</div>
        
        <a href="login.html" class="back-link">Tayari una akaunti? Ingia hapa</a>
      </form>
    </div>
  </main>

  <script>
    // Data Wilaya
    const dataWilaya = {
      arusha: ['Arusha Mjini', 'Arumeru', 'Longido', 'Karatu', 'Ngorongoro'],
      dar_es_salaam: ['Ilala', 'Kinondoni', 'Temeke', 'Ubungo', 'Kigamboni'],
      dodoma: ['Dodoma Mjini', 'Bahi', 'Chamwino', 'Kondoa', 'Kongwa', 'Mpwapwa', 'Chemba'],
      geita: ['Geita', 'Bukombe', 'Chato', 'Mbogwe', 'Nkome'],
      iringa: ['Iringa Mjini', 'Kilolo', 'Mafinga', 'Mufindi'],
      kagera: ['Bukoba Mjini', 'Bukoba Vijijini', 'Kyerwa', 'Missenyi', 'Muleba', 'Ngara'],
      katavi: ['Mpanda Mjini', 'Mpanda Vijijini', 'Mlele', 'Nsimbo'],
      kigoma: ['Kigoma Mjini', 'Uvinza', 'Kakonko', 'Kasulu Mjini', 'Kasulu Vijijini'],
      kilimanjaro: ['Moshi Mjini', 'Moshi Vijijini', 'Rombo', 'Siha', 'Hai'],
      lindi: ['Lindi Mjini', 'Kilwa', 'Liwale', 'Nachingwea', 'Ruangwa'],
      manyara: ['Babati', 'Hanang', 'Kiteto', 'Mbulu', 'Simanjiro'],
      mara: ['Musoma Mjini', 'Musoma Vijijini', 'Bunda', 'Butiama', 'Rorya', 'Tarime'],
      mbeya: ['Mbeya Mjini', 'Rungwe', 'Busokelo', 'Kyela', 'Mbarali', 'Chunya'],
      morogoro: ['Morogoro Mjini', 'Kilombero', 'Kilosa', 'Mvomero', 'Gairo', 'Ulanga', 'Kilosa'],
      mtwara: ['Mtwara Mjini', 'Masasi', 'Nanyumbu', 'Tandahimba', 'Newala'],
      mwanza: ['Ilemela', 'Nyamagana', 'Sengerema', 'Misungwi', 'Magu', 'Kwimba', 'Ukerewe'],
      njombe: ['Njombe', 'Wanging’ombe', 'Makambako', 'Ludewa'],
      pwani: ['Kibaha', 'Bagamoyo', 'Kisarawe', 'Mafia', 'Rufiji'],
      rukwa: ['Mpanda', 'Sumbawanga', 'Kalambo', 'Nkasi'],
      ruvuma: ['Songea', 'Mbinga', 'Tunduru', 'Namtumbo', 'Songea Vijijini'],
      shinyanga: ['Shinyanga Mjini', 'Kahama', 'Kishapu', 'Shinyanga Vijijini'],
      singida: ['Singida', 'Ikungi', 'Manyoni', 'Mkalama'],
      tabora: ['Tabora', 'Urambo', 'Nzega', 'Igunga', 'Sikonge'],
      tanga: ['Tanga', 'Handeni', 'Korogwe', 'Lushoto', 'Pangani']
    };

    // Sample Kata Data
    const dataKata = {
      'Ilemela': ['Buswelu', 'Kirumba', 'Kitangiri', 'Sangabuye', 'Pasiansi'],
      'Nyamagana': ['Mwanza East', 'Mirongo', 'Butimba', 'Igogo', 'Nyegezi'],
      'Ilala': ['Kinyerezi', 'Tabata', 'Majohe', 'Mchikichini'],
      'Arusha Mjini': ['Kaloleni', 'Sombetini', 'Themi', 'Sekei'],
    };

    const genderSelect = document.getElementById('gender');
    const maritalStatusContainer = document.getElementById('maritalStatusContainer');
    const maritalStatusSelect = document.getElementById('maritalStatus');
    const hasChildrenSelect = document.getElementById('hasChildren');
    const childrenDetailsContainer = document.getElementById('childrenDetailsContainer');
    const totalChildren = document.getElementById('totalChildren');
    const boysCount = document.getElementById('boysCount');
    const girlsCount = document.getElementById('girlsCount');
    const countrySelect = document.getElementById('country');
    const tanzaniaAddress = document.getElementById('tanzaniaAddress');
    const outsideAddress = document.getElementById('outsideAddress');
    const regionSelect = document.getElementById('region');
    const districtSelect = document.getElementById('district');
    const wardSelect = document.getElementById('ward');

    const maritalOptions = {
      mwanaume: [
        { value: 'Nimeoa', text: 'Nimeoa' },
        { value: 'Sijaoa', text: 'Sijaoa' },
        { value: 'Nimetarakiana', text: 'Nimetarakiana' }
      ],
      mwanamke: [
        { value: 'Nimeolewa', text: 'Nimeolewa' },
        { value: 'Sijaolewa', text: 'Sijaolewa' },
        { value: 'Nimetarakiana', text: 'Nimetarakiana' }
      ]
    };

    function toggleMenu() {
        const nav = document.getElementById("main-nav");
        nav.classList.toggle("active");
        const icon = document.querySelector(".menu-toggle i");
        if(nav.classList.contains("active")) {
            icon.classList.replace("fa-bars", "fa-times");
        } else {
            icon.classList.replace("fa-times", "fa-bars");
        }
    }

    genderSelect.addEventListener('change', () => {
      const gender = genderSelect.value;
      if (gender) {
        maritalStatusContainer.style.display = 'block';
        maritalStatusSelect.innerHTML = '<option value="" disabled selected>Chagua...</option>';
        maritalOptions[gender].forEach((opt) => {
          const option = document.createElement('option');
          option.value = opt.value;
          option.textContent = opt.text;
          maritalStatusSelect.appendChild(option);
        });
      }
    });

    hasChildrenSelect.addEventListener('change', () => {
      childrenDetailsContainer.style.display = hasChildrenSelect.value === 'ndiyo' ? 'block' : 'none';
    });

    // Auto-calculate children logic
    [totalChildren, boysCount].forEach(input => {
      input.addEventListener('input', () => {
        const total = parseInt(totalChildren.value, 10) || 0;
        const boys = parseInt(boysCount.value, 10) || 0;
        if (total >= boys) girlsCount.value = total - boys;
      });
    });

    countrySelect.addEventListener('change', () => {
      const isTZ = countrySelect.value === 'tanzania';
      tanzaniaAddress.style.display = isTZ ? 'block' : 'none';
      outsideAddress.style.display = isTZ ? 'none' : 'block';
    });

    regionSelect.addEventListener('change', () => {
      const region = regionSelect.value;
      districtSelect.innerHTML = '<option value="" disabled selected>Chagua...</option>';
      if (region && dataWilaya[region]) {
        dataWilaya[region].forEach((wilaya) => {
          const option = document.createElement('option');
          option.value = wilaya;
          option.textContent = wilaya;
          districtSelect.appendChild(option);
        });
      }
    });

    districtSelect.addEventListener('change', () => {
      const wilaya = districtSelect.value;
      wardSelect.innerHTML = '<option value="" disabled selected>Chagua...</option>';
      if (wilaya && dataKata[wilaya]) {
        dataKata[wilaya].forEach((kata) => {
          const option = document.createElement('option');
          option.value = kata;
          option.textContent = kata;
          wardSelect.appendChild(option);
        });
      }
    });

    document.getElementById('registrationForm').addEventListener('submit', (e) => {
      e.preventDefault();
      document.getElementById('successMessage').style.display = 'block';
      setTimeout(() => {
        window.location.href = 'login.html';
      }, 2500);
    });
  </script>

</body>
</html>
