<!DOCTYPE html>
<html lang="sw">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Jisajili - Ukoo wa Makomelelo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ======== VARIABLES & RESET ======== */
        :root {
            --primary: #027148;
            --primary-dark: #014d31;
            --accent: #ffcc00;
            --text-dark: #1a2e1a;
            --glass-bg: rgba(255, 255, 255, 0.9);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-dark);
            min-height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1502082553048-f009c37129b9?auto=format&fit=crop&q=80&w=2070') no-repeat center center fixed;
            background-size: cover;
            line-height: 1.6;
        }

        /* ======== HEADER ======== */
        header {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        nav#main-nav {
            display: flex;
            gap: 10px;
        }

        nav#main-nav a {
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 8px;
            transition: var(--transition);
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        nav#main-nav a:hover, nav#main-nav a.active {
            background: var(--primary);
            color: white;
        }

        .menu-toggle {
            display: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--primary);
        }

        /* ======== MAIN CONTENT ======== */
        main {
            padding: 2.5rem 5%;
            max-width: 900px;
            margin: 0 auto;
        }

        .form-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            border-top: 8px solid var(--primary);
        }

        h2 {
            font-size: 2rem;
            color: var(--primary-dark);
            margin-bottom: 0.5rem;
            font-weight: 800;
        }

        .subtitle {
            color: #666;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        /* ======== FORM STYLING ======== */
        .input-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--primary-dark);
            font-size: 0.9rem;
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 12px 15px;
            border-radius: 10px;
            border: 2px solid #ddd;
            background: rgba(255,255,255,0.8);
            font-family: inherit;
            font-size: 1rem;
            transition: var(--transition);
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(2, 113, 72, 0.1);
            background: white;
        }

        .grid-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        /* Submit Button */
        input[type="submit"] {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            margin-top: 1rem;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(2, 113, 72, 0.3);
        }

        input[type="submit"]:hover {
            background: var(--primary-dark);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(2, 113, 72, 0.4);
        }

        /* Section Containers */
        .section-box {
            padding: 1.5rem;
            background: rgba(2, 113, 72, 0.05);
            border-radius: 15px;
            margin-top: 1.5rem;
            border: 1px dashed var(--primary);
            display: none; /* Controlled by JS */
            animation: slideDown 0.4s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #successMessage {
            background: #d4edda;
            color: #155724;
            padding: 1rem;
            border-radius: 10px;
            text-align: center;
            font-weight: 700;
            margin-top: 1.5rem;
            display: none;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        /* ======== RESPONSIVE ======== */
        @media (max-width: 768px) {
            .menu-toggle { display: block; }
            nav#main-nav {
                position: fixed; top: 0; right: -100%;
                height: 100vh; width: 280px;
                background: white; flex-direction: column;
                padding: 80px 20px; transition: 0.4s;
                box-shadow: -5px 0 15px rgba(0,0,0,0.1);
            }
            nav#main-nav.active { right: 0; }
            .grid-row { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">Ukoo Makomelelo</div>
        <div class="menu-toggle" onclick="toggleMenu()">
            <i class="fas fa-bars"></i>
        </div>
        <nav id="main-nav">
            <a href="index.html"><i class="fas fa-home"></i> Nyumbani</a>
            <a href="register.html" class="active"><i class="fas fa-user-plus"></i> Jisajili</a>
            <a href="login.html"><i class="fas fa-sign-in-alt"></i> Ingia</a>
        </nav>
    </header>

    <main>
        <div class="form-card">
            <h2>Jisajili na Ukoo</h2>
            <p class="subtitle">Tafadhali jaza taarifa zako kwa usahihi ili kutambulika rasmi.</p>

            <form id="registrationForm" novalidate>
                <div class="input-group">
                    <label for="fullname"><i class="fas fa-user"></i> Jina Kamili</label>
                    <input type="text" id="fullname" name="fullname" placeholder="Andika majina yote matatu" required />
                </div>

                <div class="grid-row">
                    <div class="input-group">
                        <label for="phone"><i class="fas fa-phone"></i> Namba ya Simu</label>
                        <input type="text" id="phone" name="phone" required pattern="^07[0-9]{8}$" placeholder="Mfano: 0712345678" />
                    </div>
                    <div class="input-group">
                        <label for="gender"><i class="fas fa-venus-mars"></i> Jinsia</label>
                        <select id="gender" name="gender" required>
                            <option value="" disabled selected>Chagua...</option>
                            <option value="mwanaume">Mwanaume</option>
                            <option value="mwanamke">Mwanamke</option>
                        </select>
                    </div>
                </div>

                <div id="maritalStatusContainer" class="input-group" style="display:none;">
                    <label for="maritalStatus"><i class="fas fa-heart"></i> Hali ya Ndoa</label>
                    <select id="maritalStatus" name="maritalStatus">
                        <option value="" disabled selected>Chagua hali ya ndoa</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="hasChildren"><i class="fas fa-baby"></i> Je, una watoto?</label>
                    <select id="hasChildren" name="hasChildren" required>
                        <option value="" disabled selected>Chagua jibu</option>
                        <option value="ndiyo">Ndiyo</option>
                        <option value="hapana">Hapana</option>
                    </select>
                </div>

                <div id="childrenDetailsContainer" class="section-box">
                    <div class="input-group">
                        <label for="totalChildren">Idadi ya watoto (Jumla)</label>
                        <input type="number" id="totalChildren" name="totalChildren" min="0" placeholder="0" />
                    </div>
                    <div class="grid-row">
                        <div class="input-group">
                            <label for="boysCount">Wavulana</label>
                            <input type="number" id="boysCount" name="boysCount" min="0" placeholder="0" />
                        </div>
                        <div class="input-group">
                            <label for="girlsCount">Wasichana</label>
                            <input type="number" id="girlsCount" name="girlsCount" min="0" placeholder="0" />
                        </div>
                    </div>
                </div>

                <div class="input-group">
                    <label for="country"><i class="fas fa-globe-africa"></i> Nchi unayoishi</label>
                    <select id="country" name="country" required>
                        <option value="" disabled selected>Chagua nchi</option>
                        <option value="tanzania">Tanzania</option>
                        <option value="nje">Nje ya Tanzania</option>
                    </select>
                </div>

                <div id="tanzaniaAddress" class="section-box">
                    <div class="grid-row">
                        <div class="input-group">
                            <label for="region">Mkoa</label>
                            <select id="region" name="region">
                                <option value="" disabled selected>Chagua...</option>
                                <option value="mwanza">Mwanza</option>
                                <option value="dar_es_salaam">Dar es Salaam</option>
                                <option value="dodoma">Dodoma</option>
                                <option value="arusha">Arusha</option>
                                </select>
                        </div>
                        <div class="input-group">
                            <label for="district">Wilaya</label>
                            <select id="district" name="district">
                                <option value="" disabled selected>Chagua...</option>
                            </select>
                        </div>
                    </div>
                    <div class="grid-row">
                        <div class="input-group">
                            <label for="ward">Kata</label>
                            <select id="ward" name="ward">
                                <option value="" disabled selected>Chagua...</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="street">Mtaa/Kijiji</label>
                            <input type="text" id="street" name="street" placeholder="Jina la mtaa" />
                        </div>
                    </div>
                </div>

                <div id="outsideAddress" class="section-box">
                    <div class="input-group">
                        <label for="outsideCountry">Nchi</label>
                        <input type="text" id="outsideCountry" name="outsideCountry" placeholder="Mfano: Kenya, UK, nk." />
                    </div>
                    <div class="input-group">
                        <label for="city">Jiji/Mji</label>
                        <input type="text" id="city" name="city" placeholder="Jina la jiji" />
                    </div>
                </div>

                <input type="submit" value="Kamilisha Usajili" />

                <div id="successMessage">✅ Hongera! Usajili umefanikiwa. Tunakupeleka kwenye ukurasa wa kuingia...</div>
                
                <a href="login.html" class="back-link"><i class="fas fa-arrow-left"></i> Rudi Nyuma kwenye Kuingia</a>
            </form>
        </div>
    </main>

    <script>
        // Data logic for districts remains the same as your previous script
        const dataWilaya = {
            mwanza: ['Ilemela', 'Nyamagana', 'Sengerema', 'Misungwi', 'Magu', 'Kwimba', 'Ukerewe'],
            dar_es_salaam: ['Ilala', 'Kinondoni', 'Temeke', 'Ubungo', 'Kigamboni'],
            dodoma: ['Dodoma Mjini', 'Bahi', 'Chamwino', 'Kondoa', 'Kongwa', 'Mpwapwa', 'Chemba'],
            arusha: ['Arusha Mjini', 'Arumeru', 'Longido', 'Karatu', 'Ngorongoro']
        };

        const maritalOptions = {
            mwanaume: [{v: 'Nimeoa', t: 'Nimeoa'}, {v: 'Sijaoa', t: 'Sijaoa'}, {v: 'Nimetarakiana', t: 'Nimetarakiana'}],
            mwanamke: [{v: 'Nimeolewa', t: 'Nimeolewa'}, {v: 'Sijaolewa', t: 'Sijaolewa'}, {v: 'Nimetarakiana', t: 'Nimetarakiana'}]
        };

        // UI Interactions
        const genderSelect = document.getElementById('gender');
        const maritalStatusContainer = document.getElementById('maritalStatusContainer');
        const maritalStatusSelect = document.getElementById('maritalStatus');

        genderSelect.addEventListener('change', () => {
            const gender = genderSelect.value;
            maritalStatusContainer.style.display = 'block';
            maritalStatusSelect.innerHTML = '<option value="" disabled selected>Chagua hali ya ndoa</option>';
            maritalOptions[gender].forEach(opt => {
                const option = document.createElement('option');
                option.value = opt.v;
                option.textContent = opt.t;
                maritalStatusSelect.appendChild(option);
            });
        });

        document.getElementById('hasChildren').addEventListener('change', function() {
            document.getElementById('childrenDetailsContainer').style.display = (this.value === 'ndiyo' ? 'block' : 'none');
        });

        document.getElementById('country').addEventListener('change', function() {
            document.getElementById('tanzaniaAddress').style.display = (this.value === 'tanzania' ? 'block' : 'none');
            document.getElementById('outsideAddress').style.display = (this.value === 'nje' ? 'block' : 'none');
        });

        document.getElementById('region').addEventListener('change', function() {
            const districtSelect = document.getElementById('district');
            districtSelect.innerHTML = '<option value="" disabled selected>Chagua...</option>';
            if(dataWilaya[this.value]) {
                dataWilaya[this.value].forEach(d => {
                    const option = document.createElement('option');
                    option.value = d; option.textContent = d;
                    districtSelect.appendChild(option);
                });
            }
        });

        function toggleMenu() {
            const nav = document.getElementById("main-nav");
            nav.classList.toggle("active");
            const icon = document.querySelector(".menu-toggle i");
            icon.classList.toggle("fa-bars");
            icon.classList.toggle("fa-times");
        }

        document.getElementById('registrationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            document.getElementById('successMessage').style.display = 'block';
            setTimeout(() => { window.location.href = 'login.html'; }, 2500);
        });
    </script>
</body>
</html>
