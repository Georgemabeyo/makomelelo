<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ingia - Ukoo wa George</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ======== VARIABLES & RESET ======== */
        :root {
            --primary: #027148;
            --primary-dark: #014d31;
            --text-dark: #1a2e1a;
            --glass-bg: rgba(255, 255, 255, 0.9);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-dark);
            min-height: 100vh;
            /* Background matches the registration page for consistency */
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1502082553048-f009c37129b9?auto=format&fit=crop&q=80&w=2070') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            flex-direction: column;
        }

        /* ======== HEADER ======== */
        header {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        nav#main-nav {
            display: flex;
            gap: 10px;
        }

        nav#main-nav a {
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 8px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        nav#main-nav a:hover, nav#main-nav a.active {
            background: var(--primary);
            color: white;
        }

        .menu-toggle {
            display: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--primary);
        }

        /* ======== LOGIN CARD ======== */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.4);
            text-align: center;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-card h2 {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary-dark);
            margin-bottom: 0.5rem;
        }

        .login-card p {
            color: #666;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        /* ======== INPUTS ======== */
        .input-wrapper {
            position: relative;
            margin-bottom: 1.2rem;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
            transition: var(--transition);
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 15px 14px 45px;
            border-radius: 12px;
            border: 2px solid #eee;
            background: rgba(255,255,255,0.7);
            font-family: inherit;
            font-size: 1rem;
            transition: var(--transition);
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(2, 113, 72, 0.1);
        }

        .input-wrapper input:focus + i {
            color: var(--primary);
        }

        /* ======== BUTTONS ======== */
        input[type="submit"] {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 1rem;
            box-shadow: 0 4px 12px rgba(2, 113, 72, 0.2);
        }

        input[type="submit"]:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(2, 113, 72, 0.3);
        }

        .extra-links {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid #eee;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .extra-links a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .extra-links a:hover {
            color: var(--primary-dark);
            text-decoration: underline;
        }

        /* Overlay for Mobile */
        #overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            z-index: 999;
        }

        #overlay.active { display: block; }

        /* ======== RESPONSIVE ======== */
        @media (max-width: 768px) {
            .menu-toggle { display: block; }
            nav#main-nav {
                position: fixed; top: 0; right: -100%;
                height: 100vh; width: 260px;
                background: white; flex-direction: column;
                padding: 80px 20px; transition: 0.4s;
                box-shadow: -5px 0 15px rgba(0,0,0,0.1);
                z-index: 1001;
            }
            nav#main-nav.active { right: 0; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Ukoo wa George</div>
        <div class="menu-toggle" onclick="toggleMenu()">
            <i class="fas fa-bars"></i>
        </div>
        <nav id="main-nav">
            <a href="index.html"><i class="fas fa-home"></i> Nyumbani</a>
            <a href="register.html"><i class="fas fa-user-plus"></i> Jisajili</a>
            <a href="login.html" class="active"><i class="fas fa-sign-in-alt"></i> Ingia</a>
        </nav>
    </header>

    <main>
        <div class="login-card">
            <h2>Karibu Tena</h2>
            <p>Ingia kwenye akaunti yako ya mwanaukoo</p>

            <form id="loginForm">
                <div class="input-wrapper">
                    <input type="text" id="username" placeholder="Jina la mtumiaji" required />
                    <i class="fas fa-user"></i>
                </div>
                
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="Nenosiri" required />
                    <i class="fas fa-lock"></i>
                </div>

                <input type="submit" value="Ingia Sasa" />
            </form>

            <div class="extra-links">
                <a href="forgot.html">Umesahau nenosiri?</a>
                <a href="register.html" style="color: #666; font-weight: 400;">Huna akaunti? <span style="color: var(--primary); font-weight: 700;">Jisajili hapa</span></a>
            </div>
        </div>
    </main>

    <div id="overlay" onclick="closeMenu()"></div>

    <script>
        function toggleMenu() {
            const nav = document.getElementById('main-nav');
            const overlay = document.getElementById('overlay');
            const icon = document.querySelector(".menu-toggle i");
            
            nav.classList.toggle('active');
            overlay.classList.toggle('active');
            
            if(nav.classList.contains('active')) {
                icon.classList.replace('fa-bars', 'fa-times');
            } else {
                icon.classList.replace('fa-times', 'fa-bars');
            }
        }

        function closeMenu() {
            document.getElementById('main-nav').classList.remove('active');
            document.getElementById('overlay').classList.remove('active');
            document.querySelector(".menu-toggle i").classList.replace('fa-times', 'fa-bars');
        }

        // ✅ Login form logic
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (username && password) {
                // Show a simple loading state on the button
                const btn = e.target.querySelector('input[type="submit"]');
                btn.value = "Inapakia...";
                btn.style.opacity = "0.7";
                btn.disabled = true;

                // Save to localStorage
                localStorage.setItem('loggedInUser', username);
                
                // Redirect after a short delay for "feel"
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 800);
            } else {
                alert('Tafadhali jaza jina na nenosiri.');
            }
        });
    </script>
</body>
</html>
