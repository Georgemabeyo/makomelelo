<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ingia - Ukoo wa George</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #02a167;
            --primary-dark: #014d31;
            --accent: #00ff95;
            --glass: rgba(255, 255, 255, 0.85);
            --border-glass: rgba(255, 255, 255, 0.3);
            --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            /* Ultra-modern mesh gradient background */
            background: 
                radial-gradient(at 0% 0%, rgba(2, 161, 103, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(0, 255, 149, 0.1) 0px, transparent 50%),
                linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
                url('https://images.unsplash.com/photo-1502082553048-f009c37129b9?auto=format&fit=crop&q=80&w=2070');
            background-size: cover;
            background-attachment: fixed;
            overflow-x: hidden;
        }

        /* ======== HEADER ======== */
        header {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 1.2rem 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-glass);
            z-index: 1000;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 800;
            color: #fff;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo i { color: var(--accent); }

        nav#main-nav { display: flex; gap: 15px; }

        nav#main-nav a {
            text-decoration: none;
            color: rgba(255,255,255,0.8);
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 12px;
            transition: 0.3s;
            font-size: 0.9rem;
        }

        nav#main-nav a:hover, nav#main-nav a.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 10px 20px -5px rgba(2, 161, 103, 0.4);
        }

        /* ======== LOGIN CARD ======== */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }

        .login-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            width: 100%;
            max-width: 420px;
            padding: 3rem 2.5rem;
            border-radius: 32px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-glass);
            text-align: center;
            position: relative;
        }

        /* Decorative Glow */
        .login-card::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, var(--primary), transparent, var(--accent));
            z-index: -1;
            border-radius: 34px;
            opacity: 0.3;
        }

        .login-card h2 {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--primary-dark);
            margin-bottom: 0.8rem;
            letter-spacing: -1px;
        }

        .login-card p {
            color: #555;
            margin-bottom: 2.5rem;
            font-size: 1rem;
        }

        /* ======== INPUTS ======== */
        .input-group {
            position: relative;
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .input-group i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            font-size: 1.1rem;
            transition: 0.3s;
        }

        .input-group input {
            width: 100%;
            padding: 16px 16px 16px 52px;
            border-radius: 16px;
            border: 2px solid transparent;
            background: rgba(0,0,0,0.04);
            font-family: inherit;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s ease;
            color: var(--primary-dark);
        }

        .input-group input:focus {
            outline: none;
            background: white;
            border-color: var(--primary);
            box-shadow: 0 10px 20px -10px rgba(2, 161, 103, 0.2);
        }

        .input-group input:focus + i {
            color: var(--primary);
        }

        /* ======== BUTTON ======== */
        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            padding: 18px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 0.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-submit:hover {
            transform: scale(1.02);
            box-shadow: 0 15px 30px -5px rgba(2, 161, 103, 0.4);
        }

        .extra-links {
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .extra-links a {
            color: var(--primary-dark);
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            transition: 0.3s;
            opacity: 0.8;
        }

        .extra-links a:hover {
            opacity: 1;
            color: var(--primary);
        }

        /* ======== MOBILE ======== */
        @media (max-width: 600px) {
            header { padding: 1rem 5%; }
            .login-card { padding: 2.5rem 1.5rem; border-radius: 24px; }
            nav#main-nav { display: none; } /* Add your mobile toggle logic here */
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <i class="fas fa-leaf"></i> Ukoo wa George
        </div>
        <nav id="main-nav">
            <a href="index.html">Nyumbani</a>
            <a href="register.html">Jisajili</a>
            <a href="login.html" class="active">Ingia</a>
        </nav>
    </header>

    <main>
        <div class="login-card">
            <h2>Karibu Tena</h2>
            <p>Ingia kwenye mfumo wa mwanaukoo</p>

            <form id="loginForm">
                <div class="input-group">
                    <input type="text" id="username" placeholder="Jina la mtumiaji" required />
                    <i class="far fa-user"></i>
                </div>
                
                <div class="input-group">
                    <input type="password" id="password" placeholder="Nenosiri" required />
                    <i class="fas fa-lock-open"></i>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">
                    <span>Ingia Sasa</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <div class="extra-links">
                <a href="forgot.html">Umesahau nenosiri?</a>
                <a href="register.html" style="background: rgba(2, 161, 103, 0.08); padding: 10px; border-radius: 10px;">
                    Huna akaunti? <span style="color: var(--primary);">Jisajili hapa</span>
                </a>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const username = document.getElementById('username').value.trim();
            
            // Animation Feedback
            btn.innerHTML = `<i class="fas fa-circle-notch fa-spin"></i> Inafungua...`;
            btn.style.pointerEvents = 'none';

            setTimeout(() => {
                localStorage.setItem('loggedInUser', username);
                window.location.href = 'dashboard.html';
            }, 1200);
        });
    </script>
</body>
</html>
