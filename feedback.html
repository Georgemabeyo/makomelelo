<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Maoni - Ukoo wa Makomelelo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --sidebar-width: 260px;
            --primary-green: #028a42;
            --dark-bg: #0b1a11;
            --light-bg: #f4f7f6;
            --text-dark: #2d3436;
            --text-muted: #636e72;
            --white: #ffffff;
            --border-color: #e1e8e5;
            --transition: all 0.3s ease;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--light-bg);
            display: flex;
            min-height: 100vh;
            color: var(--text-dark);
        }

        /* ======== SIDEBAR (Consistent with Tree Page) ======== */
        aside.sidebar {
            width: var(--sidebar-width);
            background: var(--dark-bg);
            color: white;
            position: fixed;
            height: 100vh;
            display: flex;
            flex-direction: column;
            z-index: 1000;
        }

        .sidebar-header { padding: 30px 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-header h1 { font-size: 1.2rem; color: var(--primary-green); letter-spacing: 1px; }

        .sidebar-nav { flex-grow: 1; padding: 20px 10px; }
        .nav-item {
            display: flex; align-items: center; padding: 12px 15px; color: #b2bec3;
            text-decoration: none; border-radius: 8px; margin-bottom: 5px; transition: var(--transition);
        }
        .nav-item i { margin-right: 12px; width: 20px; text-align: center; }
        .nav-item:hover, .nav-item.active { background: var(--primary-green); color: white; }

        /* ======== MAIN CONTENT ======== */
        main.main-content {
            margin-left: var(--sidebar-width);
            flex-grow: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
        }

        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }

        /* ======== FEEDBACK FORM CARD ======== */
        .form-card {
            background: var(--white);
            max-width: 700px;
            width: 100%;
            margin: 0 auto;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
        }

        .form-card h2 { margin-bottom: 10px; font-weight: 700; color: var(--text-dark); }
        .form-card p { color: var(--text-muted); margin-bottom: 30px; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; color: var(--text-dark); }
        
        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            transition: var(--transition);
            background: #fafafa;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-green);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(2, 138, 66, 0.1);
        }

        .btn-submit {
            background: var(--primary-green);
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
            transition: var(--transition);
        }

        .btn-submit:hover { background: #026d35; transform: translateY(-2px); }

        /* Success Message */
        #feedbackSuccess {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background: #e6f7ef;
            color: #026d35;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            border: 1px solid rgba(2, 109, 53, 0.2);
        }

        /* ======== CLEAN FOOTER ======== */
        footer.dashboard-footer {
            margin-top: auto;
            padding: 30px 0;
            text-align: center;
            border-top: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        /* Mobile View */
        @media (max-width: 900px) {
            aside.sidebar { transform: translateX(-100%); transition: 0.3s; }
            aside.sidebar.active { transform: translateX(0); }
            main.main-content { margin-left: 0; padding: 20px; }
            .mobile-toggle { display: block !important; }
        }

        .mobile-toggle { display: none; background: none; border: none; font-size: 1.5rem; cursor: pointer; }
    </style>
</head>
<body>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h1>MAKO-DASH</h1>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i> Nyumbani</a>
            <a href="dashboard.html" class="nav-item"><i class="fas fa-chart-line"></i> Dashboard</a>
            <a href="family_tree.html" class="nav-item"><i class="fas fa-sitemap"></i> Ukoo / Tree</a>
            <a href="events.html" class="nav-item"><i class="fas fa-calendar-alt"></i> Matukio</a>
            <a href="feedback.html" class="nav-item active"><i class="fas fa-comment-alt"></i> Maoni</a>
            <div style="margin-top: 50px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
                <a href="logout.html" class="nav-item" style="color: #ff7675;"><i class="fas fa-sign-out-alt"></i> Toka</a>
            </div>
        </nav>
    </aside>

    <main class="main-content">
        <div class="top-bar">
            <button class="mobile-toggle" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
            <h2 style="font-weight: 700;">Maoni na Ushauri</h2>
            <div style="width: 40px; height: 40px; background: #ddd; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
                <i class="fas fa-user" style="color: #666;"></i>
            </div>
        </div>

        <div class="form-card">
            <h2>Tuma Maoni</h2>
            <p>Maoni yako ni muhimu katika kuboresha umoja wa ukoo wetu.</p>

            <form id="feedbackForm">
                <div class="form-group">
                    <label for="name">Jina Kamili</label>
                    <input type="text" id="name" class="form-control" placeholder="Mfano: John Makomelelo" required />
                </div>

                <div class="form-group">
                    <label for="email">Barua Pepe (Email)</label>
                    <input type="email" id="email" class="form-control" placeholder="jina@email.com" required />
                </div>

                <div class="form-group">
                    <label for="message">Ujumbe wako</label>
                    <textarea id="message" class="form-control" rows="5" placeholder="Andika hapa maoni au ushauri wako..." required></textarea>
                </div>

                <button type="submit" class="btn-submit">Tuma Maoni Sasa</button>
                
                <div id="feedbackSuccess">
                    <i class="fas fa-check-circle"></i> Asante! Maoni yako yamepokelewa na yatafanyiwa kazi.
                </div>
            </form>
        </div>

        <footer class="dashboard-footer">
            &copy; 2026 Ukoo wa Makomelelo. <br>
            <small>Haki zote zimehifadhiwa.</small>
        </footer>
    </main>

    <script>
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        // Handle Form Submission
        document.getElementById('feedbackForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.querySelector('.btn-submit');
            const successMsg = document.getElementById('feedbackSuccess');

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Inatuma...';
            btn.style.opacity = '0.7';
            btn.disabled = true;

            // Simulate server delay
            setTimeout(() => {
                successMsg.style.display = 'block';
                btn.innerHTML = 'Tuma Maoni Sasa';
                btn.style.opacity = '1';
                btn.disabled = false;
                document.getElementById('feedbackForm').reset();
                
                // Hide success message after 5 seconds
                setTimeout(() => { successMsg.style.display = 'none'; }, 5000);
            }, 1500);
        });
    </script>
</body>
</html>
